events {}

http {

    # ── Impostazioni SSL comuni ───────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── HTTP → HTTPS ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS entrypoint unico ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Se il portal risponde 401 → vai alla login
        error_page 401 = @portal_login;
        location @portal_login {
            return 302 /login?next=$request_uri;
        }

        # ── Portal (UI + login + admin) ─────────────────────────────────────
        location / {
            proxy_pass         http://portal:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Auth subrequest per RBAC (Nginx auth_request) ────────────────────
        location = /__auth_bar {
            internal;
            proxy_pass http://portal:8000/__auth;
            proxy_set_header X-Service bar;
            proxy_set_header Cookie $http_cookie;
        }

        location = /__auth_vending {
            internal;
            proxy_pass http://portal:8000/__auth;
            proxy_set_header X-Service vending;
            proxy_set_header Cookie $http_cookie;
        }

        location = /__auth_cassa {
            internal;
            proxy_pass http://portal:8000/__auth;
            proxy_set_header X-Service cassa;
            proxy_set_header Cookie $http_cookie;
        }

        # ── BAR ──────────────────────────────────────────────────────────────
        location = /bar { return 301 /bar/; }
        location /bar/ {
            auth_request /__auth_bar;
            proxy_pass         http://bar:5003/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── VENDING ──────────────────────────────────────────────────────────
        location = /vending { return 301 /vending/; }
        location /vending/ {
            auth_request /__auth_vending;
            proxy_pass         http://vending:5002/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── CASSA ────────────────────────────────────────────────────────────
        location = /cassa { return 301 /cassa/; }
        location /cassa/ {
            auth_request /__auth_cassa;
            proxy_pass         http://cassa:5001/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

}
