version: '3.8'

services:

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=./data/nfc.db
      - HMAC_SECRET=${HMAC_SECRET:-change_me_in_production}
    volumes:
      - backend_data:/app/data

  cassa:
    build: ./cassa
    ports:
      - "5001:5001"
    environment:
      - BACKEND_URL=http://backend:8080
      - DEVICE_ID=cassa
      - HMAC_SECRET=${HMAC_SECRET:-change_me_in_production}
    depends_on:
      - backend

  bar:
    build: ./bar
    ports:
      - "5003:5003"
    environment:
      - BACKEND_URL=http://backend:8080
      - DEVICE_ID=bar
      - HMAC_SECRET=${HMAC_SECRET:-change_me_in_production}
    depends_on:
      - backend

  vending:
    build: ./vending
    ports:
      - "5002:5002"
    environment:
      - BACKEND_URL=http://backend:8080
      - DEVICE_ID=vending
      - HMAC_SECRET=${HMAC_SECRET:-change_me_in_production}
    depends_on:
      - backend

volumes:
  backend_data:
