version: '3.8'

services:

  backend:
    build: ./backend
    # Non esporre porte in host: accesso solo dalla rete Docker (via Nginx/Portal)
    environment:
      - DB_PATH=./data/nfc.db
      - HMAC_SECRET=${HMAC_SECRET:-change_me_in_production}
    volumes:
      - backend_data:/app/data

  cassa:
    build: ./cassa
    # Non esporre porte in host
    environment:
      - BACKEND_URL=http://backend:8080
      - DEVICE_ID=cassa
      - HMAC_SECRET=${HMAC_SECRET:-change_me_in_production}
    depends_on:
      - backend

  bar:
    build: ./bar
    # Non esporre porte in host
    environment:
      - BACKEND_URL=http://backend:8080
      - DEVICE_ID=bar
      - HMAC_SECRET=${HMAC_SECRET:-change_me_in_production}
    depends_on:
      - backend

  vending:
    build: ./vending
    # Non esporre porte in host
    environment:
      - BACKEND_URL=http://backend:8080
      - DEVICE_ID=vending
      - HMAC_SECRET=${HMAC_SECRET:-change_me_in_production}
    depends_on:
      - backend

  portal:
    build: ./portal
    environment:
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production}
      - PORTAL_DB=/app/data/portal.db
      - INIT_ADMIN_USER=${INIT_ADMIN_USER:-admin}
      - INIT_ADMIN_PASSWORD=${INIT_ADMIN_PASSWORD:-admin}
    volumes:
      - portal_data:/app/data
    depends_on:
      - backend

  # ── Reverse proxy HTTPS (entrypoint unico) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"            # HTTP → redirect a HTTPS
      - "443:443"          # HTTPS entry point unico
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - portal
      - cassa
      - bar
      - vending
    restart: unless-stopped

volumes:
  backend_data:
  portal_data:
