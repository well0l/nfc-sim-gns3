<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ service.label }}</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b1220;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
    }
    .title {
      font-weight: 900;
      font-size: 18px;
      color: white;
    }
    iframe {
      border: 0;
      width: 100%;
      flex: 1;
      background: white;
    }
  </style>
</head>
<body>
  <header>
    <a href="/">← Dashboard</a>
    <div class="title">{{ service.emoji }} {{ service.label }}</div>
    <a href="/logout">Logout</a>
  </header>

  <iframe src="{{ service.path }}"></iframe>
</body>
</html>
