<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NFC Payment System — Login</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(135deg, #0ea5e9 0%, #1e3a8a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      background: rgba(255,255,255,0.96);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      padding: 28px;
    }
    h1 {
      margin: 0 0 16px 0;
      font-size: 26px;
      color: #0f172a;
      text-align: center;
    }
    .field {
      margin: 14px 0;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: #0f172a;
      font-size: 16px;
    }
    input {
      width: 100%;
      padding: 18px 16px;
      font-size: 18px;
      border-radius: 12px;
      border: 2px solid #cbd5e1;
      outline: none;
      box-sizing: border-box;
    }
    input:focus {
      border-color: #2563eb;
    }
    button {
      width: 100%;
      margin-top: 10px;
      padding: 18px 16px;
      font-size: 20px;
      font-weight: 800;
      border: 0;
      border-radius: 14px;
      background: #16a34a;
      color: white;
      cursor: pointer;
      min-height: 80px;
    }
    .error {
      margin-top: 12px;
      padding: 14px;
      border-radius: 12px;
      background: #fee2e2;
      color: #7f1d1d;
      font-weight: 700;
      text-align: center;
    }
    .hint {
      margin-top: 14px;
      color: #334155;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏪 NFC Payment System</h1>

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}" />

      <div class="field">
        <label for="username">👤 Username</label>
        <input id="username" name="username" autocomplete="username" inputmode="text" />
      </div>

      <div class="field">
        <label for="password">🔒 Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" />
      </div>

      <button type="submit">ACCEDI →</button>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <div class="hint">Touch-friendly: campi grandi e pulsante alto.</div>
    </form>
  </div>
</body>
</html>
